name: wordpress_api
description: A WordPress REST API client for dart with support for WooCommerce
  and custom namespaces.
version: 2.0.0
homepage: https://github.com/dhmgroup/dart-wp

environment:
  sdk: ">=2.12.0 <3.0.0"

dependencies:
  collection: ^1.15.0
  dio: ^4.0.0
  freezed_annotation: ^2.0.3
  html: ^0.15.0
  logger: ^1.1.0

dev_dependencies:
  build_runner: ^2.1.11
  freezed: ^2.0.3+1
  json_serializable: ^6.2.0
